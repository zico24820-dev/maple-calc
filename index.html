<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메이플 키우기 계산기 (TalkView Edition)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1b1e; color: #e5e7eb; font-family: 'Apple SD Gothic Neo', sans-serif; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .input-box { background-color: #25262b; border: 1px solid #373a40; color: white; transition: 0.2s; }
        .input-box:focus { border-color: #4dabf7; outline: none; }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
        .notice-bar { animation: slideDown 0.5s ease-out; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #4dabf7; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background-color: #2C2E33; }
        /* 배너 이미지 스타일 */
        .banner-img { width: 100%; height: auto; object-fit: cover; border-bottom: 1px solid #373a40; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">

 <div class="w-full flex justify-center">
    <a href="https://forum.nexon.com/maplestoryidle-kr/board_list?board=6697" target="_blank" class="w-full max-w-5xl hover:opacity-90 transition">
        <img 
            src="https://drive.google.com/thumbnail?id=1rdQtjKEwVpvOo_BPSxhQRV13u3K5_hlz&sz=w1000" 
            alt="공지 배너" 
            class="rounded-b-xl shadow-lg"
            style="width: 100%; max-width: 500px; height: auto; display: block; margin: 0 auto;"
        >
    </a>
</div>

    <div id="notice-container" class="w-full bg-blue-600 text-white text-sm text-center py-2 hidden notice-bar shadow-md z-10">
        <span class="font-bold">📢 NOTICE:</span> <span id="notice-msg">로딩중...</span>
    </div>

    <div class="w-full max-w-5xl bg-[#2C2E33] rounded-xl shadow-2xl border border-[#373A40] overflow-hidden mt-4 md:mt-8">
        
        <header class="bg-[#25262B] p-5 border-b border-[#373A40] flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold flex items-center gap-2 text-white">
                    ⚔️ 메이플 키우기 스펙 계산기
                    <span class="text-[10px] bg-gray-700 px-1.5 py-0.5 rounded text-gray-300 border border-gray-600">v<span id="app-ver">loading</span></span>
                </h1>
            </div>
            <div class="flex gap-4 text-xs text-gray-400">
                <button onclick="resetAllData()" class="hover:text-red-400 underline">전체 초기화</button>
                <span id="save-status" class="text-green-500">자동저장 ON</span>
            </div>
        </header>

        <div class="p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-3 bg-[#1A1B1E] p-4 rounded-lg border border-[#373A40]">
                <h2 class="font-bold text-[#4dabf7] mb-4 text-sm border-b border-gray-700 pb-2">📊 내 총 스펙</h2>
                <div id="base-inputs" class="space-y-2 h-[450px] overflow-y-auto pr-2 custom-scrollbar"></div>
            </div>

            <div class="lg:col-span-9 flex flex-col gap-4">
                <div class="grid grid-cols-2 gap-4 h-full">
                    <div class="bg-[#141517] p-4 rounded-lg border border-blue-900/30 flex flex-col relative group">
                        <button onclick="resetItem('A')" class="absolute top-4 right-4 text-[10px] text-gray-500 hover:text-blue-300 border border-gray-700 rounded px-2 py-1 transition">
                            ↺ 초기화
                        </button>
                        <div class="text-center mb-4 pb-2 border-b border-gray-800">
                            <span class="bg-blue-900 text-blue-200 text-xs font-bold px-3 py-1 rounded-full">착용템 (Left)</span>
                        </div>
                        <div id="itemA-inputs" class="space-y-2 flex-1 overflow-y-auto pr-2"></div>
                    </div>

                    <div class="bg-[#141517] p-4 rounded-lg border border-red-900/30 flex flex-col relative group">
                        <button onclick="resetItem('B')" class="absolute top-4 right-4 text-[10px] text-gray-500 hover:text-red-300 border border-gray-700 rounded px-2 py-1 transition">
                            ↺ 초기화
                        </button>
                        <div class="text-center mb-4 pb-2 border-b border-gray-800">
                            <span class="bg-red-900 text-red-200 text-xs font-bold px-3 py-1 rounded-full">바꿀템 (Right)</span>
                        </div>
                        <div id="itemB-inputs" class="space-y-2 flex-1 overflow-y-auto pr-2"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-[#101113] p-6 border-t border-[#373A40]">
            <div class="grid grid-cols-2 gap-8">
                <div class="text-center">
                    <div class="text-xs text-gray-400 mb-2 font-bold">👹 일반 몬스터 효율</div>
                    <div id="res-normal-diff" class="text-4xl font-mono font-bold text-gray-500">0.00%</div>
                </div>
                <div class="text-center">
                    <div class="text-xs text-yellow-500 mb-2 font-bold">😈 보스 몬스터 효율</div>
                    <div id="res-boss-diff" class="text-5xl font-mono font-bold text-gray-500">0.00%</div>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-8 mb-4 text-center text-gray-500 text-xs">
        <p class="font-bold mb-1">Created by <span id="footer-maker" class="text-gray-300">TalkView</span></p>
        <p>문의: <a href="#" id="footer-email" class="hover:text-[#4dabf7] underline">zico24820@gmail.com</a></p>
        <p class="mt-2 text-[10px] text-gray-600">Copyright © 2026 TalkView. All rights reserved.</p>
    </footer>

    <script>
        // ▼▼▼ API 주소 (그대로 두시면 됩니다) ▼▼▼
        const API_URL = "https://script.google.com/macros/s/AKfycbyyFIq1pnB-p5ea1EnNVwzLWTdDTJK93X40P1gtzqaA6wFECGcIWCNj-lHxKysaHizE/exec";
        
        // ★★★ 여기가 핵심입니다! 버전을 5.3으로 고쳐뒀습니다! ★★★
        const APP_VERSION = "5.3"; 
        // ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲

        document.getElementById('app-ver').innerText = APP_VERSION;

        const fields = [
            { key: 'atk', label: '공격력' },
            { key: 'atkSpeed', label: '공격속도%' },
            { key: 'damage', label: '데미지%' },
            { key: 'minMaxDmg', label: '최소+최대뎀' }, 
            { key: 'bossDamage', label: '보공%' },
            { key: 'normalDamage', label: '일반뎀%' },
            { key: 'critDmg', label: '크뎀%' },
            { key: 'statPercent', label: '주스텟%' },
            { key: 'flatMainStat', label: '깡 주스텟' },
        ];

        let baseStats = JSON.parse(localStorage.getItem('myBaseStats_v3')) || {};
        let itemA = {};
        let itemB = {};

        async function loadSystemInfo() {
            try {
                // 캐시 방지 적용 (?t=시간) - 무조건 최신 데이터 가져옴
                const res = await fetch(API_URL + "?t=" + new Date().getTime());
                const json = await res.json();
                const sys = json.system || {};

                // 1. 텍스트 공지
                if (sys.notice) {
                    document.getElementById('notice-msg').innerText = sys.notice;
                    document.getElementById('notice-container').classList.remove('hidden');
                }
                
                // 2. 이미지 배너
                if (sys.banner_img) {
                    const bannerContainer = document.getElementById('banner-link');
                    const bannerImg = document.getElementById('banner-img');
                    
                    let imgUrl = sys.banner_img;
                    // 구글 드라이브 링크 변환
                    if (imgUrl.includes('drive.google.com')) {
                        const idMatch = imgUrl.match(/\/d\/(.+?)\//);
                        if (idMatch && idMatch[1]) {
                            imgUrl = `https://drive.google.com/uc?export=view&id=${idMatch[1]}`;
                        }
                    }
                    
                    bannerImg.src = imgUrl;
                    bannerContainer.classList.remove('hidden');

                    if (sys.banner_link) {
                        bannerContainer.href = sys.banner_link;
                        bannerContainer.style.cursor = "pointer";
                    } else {
                        bannerContainer.removeAttribute("href");
                        bannerContainer.style.cursor = "default";
                    }
                }

                if (sys.maker) document.getElementById('footer-maker').innerText = sys.maker;
                if (sys.email) document.getElementById('footer-email').innerText = sys.email;

                if (sys.version && String(sys.version) !== String(APP_VERSION)) {
                    alert(`🚀 새 버전(${sys.version}) 업데이트가 있습니다!`);
                }
            } catch (err) {
                console.log("DB 연결 안됨(로컬 모드):", err);
            }
        }

        function renderInputs() {
            const baseContainer = document.getElementById('base-inputs');
            const itemAContainer = document.getElementById('itemA-inputs');
            const itemBContainer = document.getElementById('itemB-inputs');
            baseContainer.innerHTML = ''; itemAContainer.innerHTML = ''; itemBContainer.innerHTML = '';

            fields.forEach(f => {
                baseContainer.innerHTML += `
                    <div class="flex justify-between items-center group hover:bg-[#25262b] px-2 py-1 rounded">
                        <span class="text-xs text-gray-400 group-hover:text-white">${f.label}</span>
                        <input type="number" value="${baseStats[f.key] || ''}" placeholder="0"
                            oninput="updateBase('${f.key}', this.value)"
                            class="input-box w-20 rounded px-2 py-1 text-right text-xs font-bold">
                    </div>`;
                itemAContainer.innerHTML += `
                    <div class="flex justify-between items-center mb-1 px-2">
                        <span class="text-[10px] text-gray-500">${f.label}</span>
                        <input type="number" id="input-A-${f.key}" placeholder="-" 
                            oninput="updateItem('A', '${f.key}', this.value)"
                            class="input-box w-16 rounded px-1 py-1 text-right text-xs focus:bg-blue-900/20 border-gray-700">
                    </div>`;
                itemBContainer.innerHTML += `
                    <div class="flex justify-between items-center mb-1 px-2">
                        <span class="text-[10px] text-gray-500">${f.label}</span>
                        <input type="number" id="input-B-${f.key}" placeholder="-" 
                            oninput="updateItem('B', '${f.key}', this.value)"
                            class="input-box w-16 rounded px-1 py-1 text-right text-xs focus:bg-red-900/20 border-gray-700">
                    </div>`;
            });
        }

        function updateBase(key, value) {
            baseStats[key] = Number(value);
            localStorage.setItem('myBaseStats_v3', JSON.stringify(baseStats));
            calculate();
        }
        function updateItem(type, key, value) {
            if (type === 'A') itemA[key] = Number(value);
            else itemB[key] = Number(value);
            calculate();
        }
        function resetItem(type) {
            if (type === 'A') itemA = {}; else itemB = {};
            fields.forEach(f => {
                const inputId = `input-${type}-${f.key}`;
                const el = document.getElementById(inputId);
                if(el) el.value = ''; 
            });
            calculate();
        }
        function resetAllData() {
            if(confirm('내 스펙을 포함한 모든 데이터를 지우시겠습니까?')) { 
                localStorage.removeItem('myBaseStats_v3'); 
                location.reload(); 
            }
        }

        function calculate() {
            function getScore(stats) {
                const atk = stats.atk || 0;
                const minMaxAvg = (stats.minMaxDmg || 0) / 2;
                const totalDmgPercent = (stats.damage || 0) + minMaxAvg;
                
                const dmgMult = 1 + (totalDmgPercent / 100);
                const critMult = 1 + ((stats.critDmg || 0) / 100);
                const atkSpeedMult = 1 + ((stats.atkSpeed || 0) / 100);
                const normalMult = 1 + ((stats.normalDamage || 0) / 100);
                const bossMult = 1 + ((stats.bossDamage || 0) / 100);
                
                const baseScore = atk * dmgMult * critMult * atkSpeedMult;
                return { normal: baseScore * normalMult, boss: baseScore * bossMult };
            }

            const simStats = {};
            fields.forEach(f => simStats[f.key] = (baseStats[f.key]||0) - (itemA[f.key]||0) + (itemB[f.key]||0));
            const cur = getScore(baseStats);
            const next = getScore(simStats);
            updateDisplay('res-normal', cur.normal, next.normal);
            updateDisplay('res-boss', cur.boss, next.boss);
        }

        function updateDisplay(id, cur, next) {
            const el = document.getElementById(id + '-diff');
            if(!cur || cur === 0) { el.innerText = "0.00%"; el.className = "text-4xl font-mono font-bold text-gray-500"; return; }
            const diff = ((next - cur) / cur) * 100;
            const sign = diff > 0 ? "+" : "";
            el.innerText = `${sign}${diff.toFixed(2)}%`;
            el.className = `text-5xl font-mono font-bold my-2 ${diff > 0 ? 'text-green-400 drop-shadow' : (diff < 0 ? 'text-red-500' : 'text-gray-500')}`;
        }

        renderInputs();
        calculate();
        loadSystemInfo();
    </script>
</body>
</html>
